<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchar — MX Ink WebXR</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <canvas class="webgl"></canvas>
    <div id="sketchar-panel" class="sketchar-panel" title="Live preview: sync scene to Supabase for phone viewers">
        <div class="sketchar-title">Sketchar</div>
        <div class="sketchar-row">
            <input type="text" id="sketchar-slug" placeholder="e.g. A3Z9" maxlength="12" autocomplete="off" spellcheck="false" />
            <button type="button" id="sketchar-create">New room</button>
            <button type="button" id="sketchar-join">Use code</button>
        </div>
        <label class="sketchar-broadcast"><input type="checkbox" id="sketchar-broadcast" /> Broadcast scene</label>
        <label class="sketchar-broadcast"><input type="checkbox" id="sketchar-show-others" checked /> Show other devices</label>
        <div class="sketchar-row">
            <button type="button" id="sketchar-pin-quest">Send alignment pin</button>
            <button type="button" id="sketchar-copy">Copy viewer link</button>
        </div>
        <div id="sketchar-viewer-link" class="sketchar-link">—</div>
        <div id="sketchar-status" class="sketchar-status">Sketchar: idle (set VITE_SUPABASE_* in .env.local)</div>
    </div>
    <div id="grid-controls" class="grid-controls" title="Cell size for drawing and grab snap (when grid mode is on)">
        <label for="grid-cell-slider">Grid cell</label>
        <input type="range" id="grid-cell-slider" min="0.04" max="0.16" step="0.005" value="0.1" />
        <span id="grid-cell-value">0.1000</span>
        <span class="grid-controls-unit">m</span>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
